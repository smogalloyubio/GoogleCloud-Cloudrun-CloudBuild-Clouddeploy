apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-bitcoin-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/smogalloyubio/01-Dockerswarm.git
    targetRevision: HEAD
    path: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: dev 

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  